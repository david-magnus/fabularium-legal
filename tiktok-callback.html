<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fabularium Tales — TikTok Authorization</title>
<style>
  body{max-width:640px;margin:60px auto;padding:0 20px;font:16px/1.6 -apple-system,Segoe UI,Roboto,sans-serif;color:#222;text-align:center}
  h1{font-size:1.4rem}
  .code{margin:24px 0;padding:18px;border:2px solid #9c4221;border-radius:10px;background:#fdf6f2;
        font:600 15px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all}
  .lbl{color:#666;font-size:.85rem;margin-bottom:6px}
  button{margin-top:8px;padding:8px 18px;border:0;border-radius:8px;background:#9c4221;color:#fff;font-size:.95rem;cursor:pointer}
  .err{color:#b00}
</style></head>
<body>
<h1>Fabularium Tales — TikTok Authorization</h1>
<p>Copy the authorization code below and paste it back into the terminal:</p>
<div class="lbl">Authorization code</div>
<div class="code" id="code">…</div>
<button onclick="copy()">Copy code</button>
<p id="msg"></p>
<script>
  var p = new URLSearchParams(location.search);
  var code = p.get('code'), err = p.get('error');
  var el = document.getElementById('code');
  if (code) { el.textContent = code; }
  else { el.textContent = err ? ('Error: ' + err) : 'No code found in URL'; el.className = 'code err'; }
  function copy(){ if(code){ navigator.clipboard.writeText(code); document.getElementById('msg').textContent='Copied.'; } }
</script>
</body></html>
